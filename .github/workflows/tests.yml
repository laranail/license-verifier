name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pest:
    name: PHP ${{ matrix.php }} · ${{ matrix.dependency-versions }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.4', '8.5']
        dependency-versions: ['prefer-stable']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, fileinfo, pdo, sqlite3, pdo_sqlite, sodium
          coverage: none
          ini-values: error_reporting=E_ALL

      - name: Install dependencies
        run: composer update --${{ matrix.dependency-versions }} --no-interaction --no-progress

      - name: Run Pest
        run: vendor/bin/pest --colors=always
